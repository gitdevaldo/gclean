<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Email Validator Icon</title>
  <desc id="desc">Envelope with check mark representing validated email.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1220" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradient)" />

  <g filter="url(#softShadow)">
    <rect x="96" y="124" width="320" height="216" rx="28" fill="#ffffff" />
    <path d="M112 150 L256 264 L400 150" fill="none" stroke="#bfdbfe" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g filter="url(#softShadow)">
    <circle cx="352" cy="348" r="76" fill="#16a34a" />
    <path d="M318 350 L343 374 L387 328" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
